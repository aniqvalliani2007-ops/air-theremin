<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#0f0f1e" rx="12"/>
  
  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glowGrad)"/>
  
  <!-- Main ring (like in your app) -->
  <circle cx="32" cy="32" r="22" stroke="url(#ringGrad)" stroke-width="2.5" fill="none" opacity="0.9"/>
  <circle cx="32" cy="32" r="19" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="2 3"/>
  
  <!-- Note dots around the ring (8 notes) -->
  <circle cx="32" cy="10" r="3.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="47.5" cy="16.5" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="54" cy="32" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="47.5" cy="47.5" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="32" cy="54" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="16.5" cy="47.5" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="10" cy="32" r="3.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="16.5" cy="16.5" r="3.5" fill="#FFD700" opacity="0.7"/>
  
  <!-- Active note highlight (top) with glow -->
  <circle cx="32" cy="10" r="5" fill="none" stroke="#FF6464" stroke-width="2" opacity="0.9"/>
  <circle cx="32" cy="10" r="2" fill="#FF6464" opacity="1"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="32" cy="32" r="1" fill="#FFF" opacity="0.9"/>
  
  <!-- Hand cursor indicator -->
  <circle cx="32" cy="10" r="7" fill="none" stroke="#FF6464" stroke-width="1.5" opacity="0.4"/>
</svg>
