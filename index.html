<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Air Theremin - Play music with hand gestures using AI hand tracking">
  <meta name="theme-color" content="#0f0f1e">
  <title>Air Theremin | Gesture Controlled Instrument</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- Camera Feed (Moved to right in app mode) -->
    <div id="cameraWrapper" class="camera-wrapper">
      <video id="videoElement" autoplay playsinline muted></video>
      <div class="camera-overlay">
        <div class="camera-status">
          <div id="camStatusDot" class="status-dot active"></div>
          <span>LIVE</span>
        </div>
      </div>
    </div>

    <!-- Back Button (App UI) -->
    <button id="backButton" class="back-btn" aria-label="Go Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      <span>Home</span>
    </button>
    
    <!-- Canvas for Visualizations -->
    <canvas id="canvasElement"></canvas>
    
    <!-- Landing Page / Start Screen -->
    <div id="startScreen" class="start-screen">
      <header class="landing-header">
        <a href="index.html" class="logo-text" style="text-decoration: none; color: inherit;">AIR THEREMIN</a>
        <nav>
          <a href="about.html">About</a>
          <a href="features.html">Features</a>
        </nav>
      </header>

      <main class="start-content">
        <div class="glassy-card">
          <div class="logo">
            <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="45" stroke="#000" stroke-width="2" fill="none"/>
              <circle cx="50" cy="50" r="35" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
              <circle cx="50" cy="50" r="8" fill="#000"/>
            </svg>
          </div>
          
          <h1 class="title">Interact With Sound</h1>
          <p class="subtitle">A gesture-controlled musical instrument using cutting-edge AI.</p>
          
          <button id="startButton" class="start-btn">
            <span>Enter Application</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </main>

      <footer class="landing-footer">
        <p>&copy; 2026 Air Theremin. All rights reserved.</p>
      </footer>
    </div>
    
    <!-- Control Bar (App UI) -->
    <div id="controlBar" class="control-bar">
      <div class="control-group">
        <div class="control-item">
          <span class="control-label">Note</span>
          <span id="noteValue" class="control-value">—</span>
        </div>
        <div class="divider-vertical"></div>
        <div class="control-item">
          <span class="control-label">Frequency</span>
          <span id="freqValue" class="control-value">0 Hz</span>
        </div>
      </div>
      
      <div class="control-group">
        <div class="status">
          <div id="statusDot" class="status-dot"></div>
          <span id="statusText" class="status-text">Ready</span>
        </div>
        <button id="settingsBtn" class="icon-btn" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
      <div class="modal-container">
        <div class="modal-header">
          <h3>Settings</h3>
          <button id="closeModalBtn" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting">
            <label>Volume</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="65">
            <span id="volumeValue" class="setting-value">65%</span>
          </div>
          <div class="setting">
            <label>Waveform</label>
            <select id="waveformSelect">
              <option value="sine">Sine (Pure)</option>
              <option value="triangle">Triangle (Warm)</option>
              <option value="sawtooth">Sawtooth (Bright)</option>
              <option value="square">Square (Retro)</option>
            </select>
          </div>
          <div class="setting">
            <label>Sensitivity</label>
            <input type="range" id="sensitivitySlider" min="0.6" max="1.4" step="0.02" value="1.0">
            <span id="sensitivityValue" class="setting-value">1.00</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
